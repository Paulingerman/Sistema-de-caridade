<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="/css/cadastro-usuario.css">
</head>

<body>
    <div class="container">
        <h1>Cadastro de Usuário</h1>

        <label for="nome">Nome</label>
        <input type="text" id="nome" placeholder="Digite o nome">

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Digite o email">

        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite a senha">

        <label for="prioridade">Prioridade</label>
        <select id="prioridade">
            <option value="BAIXA">BAIXA</option>
            <option value="MEDIA">MEDIA</option>
            <option value="ALTA">ALTA</option>
            <option value="URGENTE">URGENTE</option>
            <option value="CRITICA">CRITICA</option>
        </select>

        <button onclick="cadastrarUsuario()">Cadastrar</button>

        <div id="resultado" class="resultado" style="display:none;"></div>
    </div>

    <script>
        async function cadastrarUsuario() {
            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const prioridade = document.getElementById("prioridade").value;
            const resultado = document.getElementById("resultado");

            const usuario = { nome, email, senha, prioridade };

            try {
                const response = await fetch("/usuarios", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(usuario)
                });

                const data = await response.json();

                resultado.style.display = "block";

                if (response.ok) {
                    resultado.className = "resultado sucesso";
                    resultado.textContent =
                        "Usuário cadastrado com sucesso!\n\n" +
                        JSON.stringify(data, null, 2);
                } else {
                    resultado.className = "resultado erro";
                    resultado.textContent =
                        "Erro ao cadastrar usuário:\n\n" +
                        JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultado.style.display = "block";
                resultado.className = "resultado erro";
                resultado.textContent = "Erro na requisição: " + error.message;
            }
        }
    </script>
</body>

</html>
