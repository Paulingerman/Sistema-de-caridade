<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="/css/cadastro-usuario.css">
</head>
<body>
<div class="container">
    <h1>Cadastro de Usuário</h1>

    <label for="nome">Nome</label>
    <input type="text" id="nome" placeholder="Digite o nome">

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Digite o email">

    <label for="senha">Senha</label>
    <input type="password" id="senha" placeholder="Digite a senha">

    <label for="prioridade">Prioridade</label>
    <select id="prioridade">
        <option value="BAIXA">BAIXA</option>
        <option value="MEDIA">MEDIA</option>
        <option value="ALTA">ALTA</option>
        <option value="URGENTE">URGENTE</option>
        <option value="CRITICA">CRITICA</option>
    </select>

    <div class="acoes-formulario">
    <button type="button" onclick="cadastrarUsuario()">Cadastrar</button>
    <a href="/lista-usuarios.html" class="link-listagem">Ver usuários cadastrados</a>
    </div>

    <div id="resultado" class="resultado" style="display:none;"></div>
</div>

<script src="/js/cadastro-usuario.js"></script>
</body>
</html>
