<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/cadastro-usuario.css">
</head>
<body>
<div class="page-shell">
    <div id="app-navbar"></div>

    <main class="page-content">
        <div class="container">
            <h1>Cadastro de Usuário</h1>

            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome">

            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="Digite o telefone">

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Digite o email">

            <label for="endereco">Endereço</label>
            <input type="text" id="endereco" placeholder="Digite o endereço">

            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Digite a senha">

            <label for="prioridade">Prioridade</label>
            <select id="prioridade">
                <option value="BAIXA">BAIXA</option>
                <option value="MEDIA">MEDIA</option>
                <option value="ALTA">ALTA</option>
                <option value="URGENTE">URGENTE</option>
                <option value="CRITICA">CRITICA</option>
            </select>

            <label for="perfil">Perfil</label>
            <select id="perfil">
                <option value="ADMIN">ADMIN</option>
                <option value="OPERADOR">OPERADOR</option>
                <option value="BENEFICIARIO">BENEFICIARIO</option>
                <option value="DOADOR">DOADOR</option>
            </select>

            <div class="acoes-formulario">
                <button type="button" onclick="cadastrarUsuario()">Cadastrar</button>
                <a href="/lista-usuarios.html" class="link-listagem">Ver usuários cadastrados</a>
            </div>

            <div id="resultado" class="resultado" style="display:none;"></div>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/cadastro-usuario.js"></script>
<script>
    renderNavbar("usuarios");
</script>
</body>
</html>
