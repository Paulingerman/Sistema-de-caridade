<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos - Rede Solidária</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/pedidos.css">
</head>
<body>
<div class="page-shell">
    <div id="app-navbar"></div>

    <main class="page-content">
        <section class="pedidos-wrapper">
            <div class="pedidos-header">
                <span class="pedidos-tag">Acompanhamento</span>
                <h1>Pedidos Registrados</h1>
                <p>
                    Visualize os pedidos realizados, acompanhe o status de cada solicitação
                    e conclua ou cancele quando necessário.
                </p>
            </div>

            <section class="pedidos-toolbar">
                <div class="pedidos-filtros">
                    <div class="filtro-group">
                        <label for="filtroBeneficiario">ID do beneficiário</label>
                        <input type="text" id="filtroBeneficiario" placeholder="Filtrar por beneficiário">
                    </div>

                    <div class="filtro-group">
                        <label for="filtroStatus">Status</label>
                        <select id="filtroStatus">
                            <option value="">Todos</option>
                            <option value="PENDENTE">PENDENTE</option>
                            <option value="APROVADA">APROVADA</option>
                            <option value="REJEITADA">REJEITADA</option>
                            <option value="CANCELADA">CANCELADA</option>
                            <option value="CONCLUIDA">CONCLUÍDA</option>
                        </select>
                    </div>
                </div>

                <div class="pedidos-actions-top">
                    <button type="button" class="button-secondary" onclick="aplicarFiltrosPedidos()">Aplicar filtros</button>
                    <button type="button" class="button-primary" onclick="carregarPedidos()">Atualizar</button>
                    <a href="/solicitacao.html" class="button button-secondary">Nova solicitação</a>
                </div>
            </section>

            <div id="mensagem-pedidos" class="message-box"></div>

            <section id="pedidos-grid" class="pedidos-grid"></section>
        </section>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/pedidos.js"></script>
<script>
    renderNavbar("pedidos");
</script>
</body>
</html>
