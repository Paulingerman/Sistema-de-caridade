<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Item</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/cadastro-item.css">
</head>
<body>
<div class="page-shell">
    <div id="app-navbar"></div>

    <main class="page-content">
        <section class="item-wrapper">
            <div class="item-header">
                <span class="item-tag">Itens</span>
                <h1>Novo Item de Doação</h1>
                <p>Cadastre um item que poderá ser solicitado no sistema.</p>
            </div>

            <div class="item-card">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="nomeItem">Nome do item</label>
                        <input type="text" id="nomeItem" placeholder="Ex.: Cesta básica">
                    </div>

                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria">
                            <option value="ROUPA">ROUPA</option>
                            <option value="ALIMENTO_NAO_PERECIVEL">ALIMENTO NÃO PERECÍVEL</option>
                            <option value="MATERIAL_ESCOLAR">MATERIAL ESCOLAR</option>
                            <option value="MOVEL">MÓVEL</option>
                            <option value="HIGIENE">HIGIENE</option>
                            <option value="BRINQUEDO">BRINQUEDO</option>
                            <option value="ELETRODOMESTICO">ELETRODOMÉSTICO</option>
                            <option value="OUTROS">OUTROS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="quantidade">Quantidade</label>
                        <input type="number" id="quantidade" min="1" placeholder="Ex.: 10">
                    </div>

                    <div class="form-group">
                        <label for="estadoConservacao">Estado de conservação</label>
                        <select id="estadoConservacao">
                            <option value="NOVO">NOVO</option>
                            <option value="OTIMO">ÓTIMO</option>
                            <option value="BOM">BOM</option>
                            <option value="REGULAR">REGULAR</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label for="descricao">Descrição</label>
                        <textarea id="descricao" rows="5" placeholder="Descreva o item cadastrado"></textarea>
                    </div>
                </div>

                <div class="item-actions">
                    <button type="button" class="button-primary" onclick="cadastrarItem()">Cadastrar Item</button>
                    <a href="/estoque-itens.html" class="button button-secondary">Ver estoque</a>
                </div>

                <div id="mensagem-item" class="message-box"></div>
            </div>
        </section>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/cadastro-item.js"></script>
<script>
    renderNavbar("itens");
</script>
</body>
</html>
