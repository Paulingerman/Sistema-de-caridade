<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Usuários</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/lista-usuarios.css">
</head>
<body>
<div class="page-shell">
    <div id="app-navbar"></div>

    <main class="page-content">
        <div class="container">
            <div class="topo">
                <div>
                    <h1>Usuários Cadastrados</h1>
                    <p class="subtitulo">Gerencie usuários, visualize detalhes, edite e exclua registros.</p>
                </div>

                <div class="acoes-topo">
                    <a href="/cadastro-usuario.html" class="botao secundario">Novo Usuário</a>
                    <button class="botao primario" type="button" onclick="carregarUsuarios()">Atualizar Lista</button>
                </div>
            </div>

            <div class="barra-filtros">
                <input
                        type="text"
                        id="campo-busca"
                        placeholder="Buscar por nome, email, telefone, endereço, perfil, id ou prioridade..."
                        oninput="filtrarUsuarios()"
                >
            </div>

            <div id="mensagem" class="mensagem" style="display: none;"></div>

            <div class="tabela-wrapper">
                <table>
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Endereço</th>
                        <th>Prioridade</th>
                        <th>Perfil</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="tabela-usuarios"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div id="modal-overlay" class="modal-overlay oculto">
    <div class="modal">
        <div class="modal-topo">
            <h2 id="modal-titulo">Usuário</h2>
            <button class="botao-fechar" type="button" onclick="fecharModal()">×</button>
        </div>

        <input type="hidden" id="modal-usuario-id">

        <div class="campo">
            <label for="modal-nome">Nome</label>
            <input type="text" id="modal-nome">
        </div>

        <div class="campo">
            <label for="modal-telefone">Telefone</label>
            <input type="text" id="modal-telefone">
        </div>

        <div class="campo">
            <label for="modal-email">Email</label>
            <input type="email" id="modal-email">
        </div>

        <div class="campo">
            <label for="modal-endereco">Endereço</label>
            <input type="text" id="modal-endereco">
        </div>

        <div class="campo" id="campo-senha-container">
            <label for="modal-senha">Senha</label>
            <input type="password" id="modal-senha" placeholder="Digite a senha">
        </div>

        <div class="campo">
            <label for="modal-prioridade">Prioridade</label>
            <select id="modal-prioridade">
                <option value="BAIXA">BAIXA</option>
                <option value="MEDIA">MEDIA</option>
                <option value="ALTA">ALTA</option>
                <option value="URGENTE">URGENTE</option>
                <option value="CRITICA">CRITICA</option>
            </select>
        </div>

        <div class="campo">
            <label for="modal-perfil">Perfil</label>
            <select id="modal-perfil">
                <option value="ADMIN">ADMIN</option>
                <option value="OPERADOR">OPERADOR</option>
                <option value="BENEFICIARIO">BENEFICIARIO</option>
                <option value="DOADOR">DOADOR</option>
            </select>
        </div>

        <div class="modal-acoes">
            <button class="botao secundario" type="button" onclick="fecharModal()">Fechar</button>
            <button id="botao-salvar-edicao" class="botao primario" type="button" onclick="salvarEdicao()">Salvar Alterações</button>
        </div>
    </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/lista-usuarios.js"></script>
<script>
    renderNavbar("usuarios-lista");
</script>
</body>
</html>
