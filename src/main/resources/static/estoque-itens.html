<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque de Itens</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/estoque-itens.css">
</head>
<body>
<div class="page-shell">
    <div id="app-navbar"></div>

    <main class="page-content">
        <section class="estoque-wrapper">
            <div class="estoque-header">
                <span class="estoque-tag">Estoque</span>
                <h1>Itens Disponíveis e Indisponíveis</h1>
                <p>Gerencie o estoque, acompanhe a quantidade e atualize o status dos itens cadastrados.</p>
            </div>

            <section class="estoque-toolbar">
                <div class="estoque-filtros">
                    <div class="filtro-group">
                        <label for="filtroCategoria">Categoria</label>
                        <select id="filtroCategoria">
                            <option value="">Todas</option>
                            <option value="ROUPA">ROUPA</option>
                            <option value="ALIMENTO_NAO_PERECIVEL">ALIMENTO NÃO PERECÍVEL</option>
                            <option value="MATERIAL_ESCOLAR">MATERIAL ESCOLAR</option>
                            <option value="MOVEL">MÓVEL</option>
                            <option value="HIGIENE">HIGIENE</option>
                            <option value="BRINQUEDO">BRINQUEDO</option>
                            <option value="ELETRODOMESTICO">ELETRODOMÉSTICO</option>
                            <option value="OUTROS">OUTROS</option>
                        </select>
                    </div>

                    <div class="filtro-group">
                        <label for="filtroStatus">Status</label>
                        <select id="filtroStatus">
                            <option value="">Todos</option>
                            <option value="DISPONIVEL">DISPONÍVEL</option>
                            <option value="RESERVADO">RESERVADO</option>
                            <option value="ENTREGUE">ENTREGUE</option>
                            <option value="CANCELADO">CANCELADO</option>
                        </select>
                    </div>
                </div>

                <div class="estoque-actions-top">
                    <button type="button" class="button-secondary" onclick="aplicarFiltrosItens()">Aplicar filtros</button>
                    <button type="button" class="button-primary" onclick="carregarItens()">Atualizar</button>
                    <a href="/cadastro-item.html" class="button button-secondary">Novo item</a>
                </div>
            </section>

            <div id="mensagem-itens" class="message-box"></div>

            <section id="itens-grid" class="itens-grid"></section>
        </section>
    </main>
</div>

<script src="/js/app.js"></script>
<script src="/js/estoque-itens.js"></script>
<script>
    renderNavbar("estoque");
</script>
</body>
</html>
