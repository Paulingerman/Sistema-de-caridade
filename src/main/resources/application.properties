spring.application.name=sistemadecaridade

# ===============================
# DATASOURCE / POSTGRESQL
# ===============================
# CVE-2025-49146 Mitigation: Use verify-full sslMode to prevent MITM attacks
# while waiting for PostgreSQL JDBC driver patch
spring.datasource.hikari.connection-init-sql=SET sslmode=require
spring.jpa.properties.hibernate.jdbc.url_connection_init_sql=SET sslmode=require

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# SWAGGER / OPENAPI
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html